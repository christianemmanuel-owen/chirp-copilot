<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Connection Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 2rem;
            color: white;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .content {
            padding: 2rem;
        }
        
        .status-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid #667eea;
        }
        
        .status-card.success {
            border-left-color: #10b981;
            background: #ecfdf5;
        }
        
        .status-card.warning {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }
        
        .status-card.error {
            border-left-color: #ef4444;
            background: #fef2f2;
        }
        
        .status-card h3 {
            margin-bottom: 0.75rem;
            font-size: 1.125rem;
        }
        
        .status-card ul {
            margin-left: 1.5rem;
            margin-top: 0.5rem;
        }
        
        .status-card li {
            margin-bottom: 0.5rem;
        }
        
        .button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        .button.secondary {
            background: #6b7280;
        }
        
        .code-block {
            background: #1f2937;
            color: #10b981;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            margin: 1rem 0;
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
        }
        
        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-right: 0.5rem;
        }
        
        .badge.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .badge.error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .badge.warning {
            background: #fef3c7;
            color: #92400e;
        }
        
        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }
        
        .info-item {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }
        
        .info-item strong {
            display: block;
            color: #6b7280;
            font-size: 0.875rem;
            margin-bottom: 0.25rem;
        }
        
        .info-item span {
            color: #111827;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔗 Instagram Connection Tester</h1>
            <p>Diagnose and test your Instagram OAuth configuration</p>
        </div>
        
        <div class="content">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Running diagnostics...</p>
            </div>
            
            <div id="results" style="display: none;"></div>
        </div>
    </div>
    
    <script>
        async function runDiagnostics() {
            try {
                const response = await fetch('/api/admin/instagram/test-flow');
                const data = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('results').style.display = 'block';
                
                let html = '';
                
                // Status badge
                const statusClass = data.status === 'ok' ? 'success' : data.status === 'warning' ? 'warning' : 'error';
                const statusText = data.status === 'ok' ? '✓ Ready' : data.status === 'warning' ? '⚠ Warnings' : '✗ Issues Found';
                
                html += `<div class="status-card ${statusClass}">`;
                html += `<h3><span class="badge ${statusClass}">${statusText}</span> Configuration Status</h3>`;
                
                // Configuration details
                html += '<div class="info-grid">';
                html += `<div class="info-item"><strong>App ID</strong><span>${data.configuration.appId}</span></div>`;
                html += `<div class="info-item"><strong>App Secret</strong><span>${data.configuration.appSecret}</span></div>`;
                html += `<div class="info-item"><strong>Scopes</strong><span>${data.configuration.scopes.length} configured</span></div>`;
                html += '</div>';
                
                html += `<div class="info-item" style="margin-top: 1rem;"><strong>Redirect URI</strong><span style="word-break: break-all;">${data.configuration.redirectUri}</span></div>`;
                html += '</div>';
                
                // Issues
                if (data.issues && data.issues.length > 0) {
                    html += '<div class="status-card error">';
                    html += '<h3>❌ Issues Found</h3>';
                    html += '<ul>';
                    data.issues.forEach(issue => {
                        html += `<li>${issue}</li>`;
                    });
                    html += '</ul>';
                    html += '</div>';
                }
                
                // Warnings
                if (data.warnings && data.warnings.length > 0) {
                    html += '<div class="status-card warning">';
                    html += '<h3>⚠️ Warnings</h3>';
                    html += '<ul>';
                    data.warnings.forEach(warning => {
                        html += `<li>${warning}</li>`;
                    });
                    html += '</ul>';
                    html += '</div>';
                }
                
                // Next steps
                html += '<div class="status-card">';
                html += '<h3>📋 Next Steps</h3>';
                html += '<ol>';
                data.nextSteps.forEach(step => {
                    html += `<li>${step}</li>`;
                });
                html += '</ol>';
                html += '</div>';
                
                // OAuth URL
                if (data.oauthUrl) {
                    html += '<div class="status-card">';
                    html += '<h3>🔗 OAuth URL (for debugging)</h3>';
                    html += '<p style="margin-bottom: 0.5rem; color: #6b7280;">This is the URL your app will redirect to:</p>';
                    html += `<div class="code-block">${data.oauthUrl}</div>`;
                    html += '</div>';
                }
                
                // Actions
                html += '<div class="actions">';
                if (data.metaAppDashboard) {
                    html += `<a href="${data.metaAppDashboard}" target="_blank" class="button">Open Meta App Dashboard</a>`;
                }
                html += '<a href="/admin/settings" class="button secondary">Go to Settings</a>';
                html += '<button onclick="location.reload()" class="button secondary">Refresh Test</button>';
                html += '</div>';
                
                // Setup checklist link
                html += '<div style="margin-top: 2rem; padding: 1rem; background: #f8f9fa; border-radius: 8px; text-align: center;">';
                html += '<p style="margin-bottom: 0.5rem;">📚 Need detailed setup instructions?</p>';
                html += '<p style="color: #6b7280; font-size: 0.875rem;">Check <code>INSTAGRAM_SETUP_CHECKLIST.md</code> in your project root</p>';
                html += '</div>';
                
                document.getElementById('results').innerHTML = html;
                
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('results').style.display = 'block';
                document.getElementById('results').innerHTML = `
                    <div class="status-card error">
                        <h3>❌ Error Running Diagnostics</h3>
                        <p>${error.message}</p>
                        <p style="margin-top: 1rem; color: #6b7280;">Make sure your dev server is running and try again.</p>
                    </div>
                `;
            }
        }
        
        // Run diagnostics on page load
        runDiagnostics();
    </script>
</body>
</html>
